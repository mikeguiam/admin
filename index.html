<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfit214web - Scout Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center p-4">

    <!-- 1. LOGIN SCREEN -->
    <div id="loginCard" class="bg-white p-8 rounded-xl shadow-md w-full max-w-md border border-slate-100">
        <h2 class="text-2xl font-bold text-slate-800 text-center mb-6">BSP Scout Log In</h2>
        <div id="loginError" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm"></div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-semibold mb-2">Username</label>
                <input type="text" id="loginUsername" required placeholder="e.g., ScoutJuan" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-semibold mb-2">Password</label>
                <input type="password" id="loginPassword" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            
            <!-- REMEMBER ME CHECKBOX -->
            <div class="flex items-center mb-6">
                <input type="checkbox" id="loginRemember" class="w-4 h-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500 cursor-pointer">
                <label for="loginRemember" class="ml-2 text-sm text-slate-600 select-none cursor-pointer">Remember my credentials</label>
            </div>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-lg transition duration-200">Sign In</button>
        </form>
        <p class="mt-4 text-sm text-center text-slate-600">
            New Scout? <button onclick="switchView('signup')" class="text-emerald-600 hover:underline font-semibold">Create an Account</button>
        </p>
    </div>

    <!-- 2. SIGN-UP SCREEN -->
    <div id="signupCard" class="hidden bg-white p-8 rounded-xl shadow-md w-full max-w-md border border-slate-100">
        <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center">Scout Registration</h2>
        <div id="signupError" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm"></div>
        
        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-semibold mb-2">Full Name</label>
                <input type="text" id="signupName" required placeholder="Juan Dela Cruz" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none">
            </div>
            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-semibold mb-2">Choose Username</label>
                <input type="text" id="signupUsername" required placeholder="No spaces allowed" pattern="^\S+$" title="Username cannot contain spaces" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none">
            </div>
            <div class="mb-6">
                <label class="block text-slate-700 text-sm font-semibold mb-2">Password</label>
                <input type="password" id="signupPassword" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition duration-200">Register</button>
        </form>
        <p class="mt-4 text-sm text-center text-slate-600">
            Already registered? <button onclick="switchView('login')" class="text-blue-600 hover:underline font-semibold">Log In</button>
        </p>
    </div>

    <!-- 3. PROFILE DASHBOARD -->
    <div id="portalContainer" class="hidden w-full max-w-4xl bg-white rounded-xl shadow-md overflow-hidden min-h-[500px] border border-slate-100">
        <div class="bg-slate-800 p-6 flex justify-between items-center text-white">
            <div>
                <h2 class="text-2xl font-bold text-emerald-400">BSP Scout Profile Terminal</h2>
                <p class="text-xs text-slate-400 mt-1">Keep your profile records up to date.</p>
            </div>
            <button onclick="handleLogout()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg font-semibold text-sm transition">Log Out</button>
        </div>

        <div class="p-8">
            <div id="profileSuccess" class="hidden mb-6 p-3 bg-emerald-100 text-emerald-700 rounded-lg text-sm">Profile fields saved locally!</div>
            
            <form id="profileForm" onsubmit="handleSaveProfile(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-slate-700 text-sm font-semibold mb-2">Full Name</label>
                        <input type="text" id="profileName" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                    <div>
                        <label class="block text-slate-700 text-sm font-semibold mb-2">Username Reference</label>
                        <input type="text" id="profileUsername" disabled class="w-full px-3 py-2 border border-slate-200 bg-slate-50 text-slate-400 rounded-lg cursor-not-allowed">
                    </div>
                    <div>
                        <label class="block text-slate-700 text-sm font-semibold mb-2">BSP Serial Number</label>
                        <input type="text" id="profileSerial" placeholder="e.g., BSP-2026-XXXX" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                    <div>
                        <label class="block text-slate-700 text-sm font-semibold mb-2">Rank in BSP</label>
                        <select id="profileRank" class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            <option value="">-- Choose Rank --</option>
                            <option value="Membership Card Only">Membership Only</option>
                            <option value="Tenderfoot">Tenderfoot</option>
                            <option value="Second Class">Second Class</option>
                            <option value="First Class">First Class</option>
                            <option value="Star">Star</option>
                            <option value="Life">Life</option>
                            <option value="Eagle Scout">Eagle Scout</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-slate-700 text-sm font-semibold mb-2">Complete Address</label>
                        <input type="text" id="profileAddress" placeholder="Barangay, Municipality/City, Province" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                </div>
                <div class="mt-6 flex justify-end">
                    <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 py-2 rounded-lg transition duration-200">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        if (!localStorage.getItem('clean_bsp_database')) {
            localStorage.setItem('clean_bsp_database', JSON.stringify({}));
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Fill in remembered login details if they exist
            if (localStorage.getItem('bsp_remember_me') === 'true') {
                document.getElementById('loginUsername').value = localStorage.getItem('bsp_remembered_user') || '';
                document.getElementById('loginPassword').value = localStorage.getItem('bsp_remembered_pass') || '';
                document.getElementById('loginRemember').checked = true;
            }
            checkCurrentSession();
        });

        function checkCurrentSession() {
            const activeUser = sessionStorage.getItem('bsp_active_session');
            if (activeUser) {
                let users = JSON.parse(localStorage.getItem('clean_bsp_database'));
                if (users && users[activeUser]) {
                    loadProfileData(activeUser);
                    switchView('portal');
                    return;
                }
            }
            switchView('login');
        }

        function switchView(view) {
            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('signupCard').classList.add('hidden');
            document.getElementById('portalContainer').classList.add('hidden');

            if (view === 'login') document.getElementById('loginCard').classList.remove('hidden');
            if (view === 'signup') document.getElementById('signupCard').classList.remove('hidden');
            if (view === 'portal') document.getElementById('portalContainer').classList.remove('hidden');
        }

        function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const username = document.getElementById('signupUsername').value.toLowerCase().trim();
            const password = document.getElementById('signupPassword').value;
            const errorDiv = document.getElementById('signupError');

            let users = JSON.parse(localStorage.getItem('clean_bsp_database'));
            if (users[username]) {
                errorDiv.textContent = "This username is already taken.";
                errorDiv.classList.remove('hidden');
                return;
            }

            users[username] = { name, password, serial: '', rank: '', address: '' };
            localStorage.setItem('clean_bsp_database', JSON.stringify(users));
            
            document.getElementById('signupForm').reset();
            alert('Scout username registered! Please log in now.');
            switchView('login');
        }

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.toLowerCase().trim();
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('loginRemember').checked;
            const errorDiv = document.getElementById('loginError');

            let users = JSON.parse(localStorage.getItem('clean_bsp_database'));

            if (users[username] && users[username].password === password) {
                errorDiv.classList.add('hidden');
                
                // Process Remember Me Option
                if (rememberMe) {
                    localStorage.setItem('bsp_remember_me', 'true');
                    localStorage.setItem('bsp_remembered_user', username);
                    localStorage.setItem('bsp_remembered_pass', password);
                } else {
                    localStorage.removeItem('bsp_remember_me');
                    localStorage.removeItem('bsp_remembered_user');
                    localStorage.removeItem('bsp_remembered_pass');
                }

                sessionStorage.setItem('bsp_active_session', username);
                loadProfileData(username);
                switchView('portal');
            } else {
                errorDiv.textContent = "Username not found or password incorrect.";
                errorDiv.classList.remove('hidden');
            }
        }

        function loadProfileData(username) {
            let users = JSON.parse(localStorage.getItem('clean_bsp_database'));
            let data = users[username];
            if (!data) return handleLogout();

            document.getElementById('profileName').value = data.name || '';
            document.getElementById('profileUsername').value = username;
            document.getElementById('profileSerial').value = data.serial || '';
            document.getElementById('profileRank').value = data.rank || '';
            document.getElementById('profileAddress').value = data.address || '';
        }

        function handleSaveProfile(e) {
            e.preventDefault();
            const username = sessionStorage.getItem('bsp_active_session');
            if (!username) return handleLogout();

            let users = JSON.parse(localStorage.getItem('clean_bsp_database'));
            if (users[username]) {
                users[username].name = document.getElementById('profileName').value;
                users[username].serial = document.getElementById('profileSerial').value;
                users[username].rank = document.getElementById('profileRank').value;
                users[username].address = document.getElementById('profileAddress').value;

                localStorage.setItem('clean_bsp_database', JSON.stringify(users));

                const successDiv = document.getElementById('profileSuccess');
                successDiv.classList.remove('hidden');
                setTimeout(() => successDiv.classList.add('hidden'), 3000);
            }
        }

        function handleLogout() {
            sessionStorage.removeItem('bsp_active_session');
            switchView('login');
            // Re-populate data if remember me is active
            if (localStorage.getItem('bsp_remember_me') === 'true') {
                document.getElementById('loginUsername').value = localStorage.getItem('bsp_remembered_user') || '';
                document.getElementById('loginPassword').value = localStorage.getItem('bsp_remembered_pass') || '';
            } else {
                document.getElementById('loginForm').reset();
            }
        }
        
        window.addEventListener('storage', (e) => {
            if (e.key === 'clean_bsp_database') {
                const activeUser = sessionStorage.getItem('bsp_active_session');
                if (activeUser) {
                    let database = JSON.parse(e.newValue) || {};
                    if (!database[activeUser]) {
                        alert('Your account profile has been modified or removed by administration.');
                        handleLogout();
                    }
                }
            }
        });
    </script>
</body>
</html>
